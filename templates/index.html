<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Pi Node Setup Helper v11.0 - A web-based tool to install and configure Pi Node components">
    <title>Pi Node Setup Helper v11.0</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>π</text></svg>">
</head>
<body>
    <div id="app-root"></div>
    <script>
        window.APP_VERSION = "{{ version }}";
        window.VITE_TELEMETRY_URL = "{{ telemetry_url }}";
        window.SYSTEM_LANG = "{{ system_lang }}";
        window.NODE_ID = "{{ node_id }}";
    </script>
    <script src="{{ url_for('static', filename='js/telemetry.js') }}"></script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
